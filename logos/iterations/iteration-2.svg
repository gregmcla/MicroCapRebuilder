<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 256">
  <defs>
    <filter id="glow-g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-scott" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1024" height="256" fill="#050508"/>
  <line x1="0" y1="200" x2="1024" y2="200" stroke="#7c5cfc" stroke-width="0.8" opacity="0.2"/>
  <text x="48" y="192" font-size="160" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" fill="none" stroke="#00f5ff" stroke-width="3" letter-spacing="-2" filter="url(#glow-g)">G</text>
  <text x="158" y="192" font-size="160" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" fill="none" stroke="#7c5cfc" stroke-width="2" letter-spacing="-2" filter="url(#glow-scott)">Scott</text>
</svg>
