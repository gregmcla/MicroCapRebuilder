<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 256">
  <defs>
    <filter id="glow-strong" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="256" fill="#050508"/>

  <text x="60" y="185" font-size="160" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="900" fill="#7c5cfc" filter="url(#glow-strong)">G</text>

  <text x="170" y="185" font-size="160" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="700" fill="none" stroke="#a78bfa" stroke-width="1.5" filter="url(#glow-soft)">Scott</text>

  <line x1="60" y1="202" x2="960" y2="202" stroke="#7c5cfc" stroke-width="0.6" opacity="0.25"/>
</svg>
