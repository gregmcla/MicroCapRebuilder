<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="52%" r="40%" fx="50%" fy="52%">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#7c5cfc" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#080810"/>

  <!-- Radial glow behind G -->
  <ellipse cx="256" cy="220" rx="200" ry="180" fill="url(#glow)"/>

  <!-- Hero G -->
  <text
    x="256"
    y="280"
    font-size="280"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-weight="900"
    fill="#7c5cfc"
    text-anchor="middle"
    dominant-baseline="auto"
  >G</text>

  <!-- SCOTT -->
  <text
    x="256"
    y="370"
    font-size="48"
    letter-spacing="22"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-weight="300"
    fill="#a0a0b8"
    text-anchor="middle"
    dominant-baseline="auto"
  >SCOTT</text>

  <!-- Thin violet rule -->
  <line x1="80" y1="385" x2="432" y2="385" stroke="#7c5cfc" stroke-width="0.8" opacity="0.5"/>
</svg>
