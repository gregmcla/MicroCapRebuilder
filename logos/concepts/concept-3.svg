    <line x1="208" y1="144" x2="206" y2="175"/>
    <line x1="206" y1="175" x2="204" y2="195"/>
    <line x1="298" y1="140" x2="306" y2="170"/>
    <line x1="306" y1="170" x2="308" y2="192"/>
