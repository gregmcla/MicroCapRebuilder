    <line x1="268" y1="248" x2="264" y2="268"/>
    <polyline points="248,268 256,274 264,268"/>
    <!-- Jaw left -->
    <polyline points="210,256 200,278 206,300 232,304 256,312"/>
    <!-- Jaw right -->
    <polyline points="302,252 308,275 304,298 280,306 256,312"/>
