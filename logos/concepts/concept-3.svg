    <polyline points="196,72 218,58 240,52 262,50 284,54 306,64 324,80 336,100"/>
    <!-- Hair to hairline left -->
    <line x1="196" y1="72" x2="200" y2="108"/>
    <line x1="218" y1="58" x2="216" y2="90"/>
    <line x1="240" y1="52" x2="240" y2="80"/>
    <line x1="262" y1="50" x2="264" y2="78"/>
    <line x1="284" y1="54" x2="290" y2="84"/>
    <line x1="306" y1="64" x2="312" y2="96"/>
    <line x1="324" y1="80" x2="310" y2="118"/>
