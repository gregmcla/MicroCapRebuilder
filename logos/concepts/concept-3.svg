    <polyline points="180,355 148,380 118,420 96,460"/>
    <!-- Right shoulder -->
    <line x1="294" y1="362" x2="332" y2="352"/>
    <polyline points="332,352 362,378 394,418 420,460"/>
    <!-- Hair flow left side -->
    <line x1="196" y1="72" x2="182" y2="270"/>
    <polyline points="182,270 176,320 168,380 158,430"/>
    <line x1="192" y1="130" x2="182" y2="270"/>
    <line x1="198" y1="180" x2="182" y2="270"/>
