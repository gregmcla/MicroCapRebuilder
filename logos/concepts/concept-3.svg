<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep space background -->
    <radialGradient id="nebula-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1a0a3a" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#0d0520" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#040812" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula-glow2" cx="52%" cy="38%" r="35%">
      <stop offset="0%" stop-color="#2a0a4a" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#150830" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#040812" stop-opacity="0"/>
    </radialGradient>
    <!-- Star glow filter -->
    <filter id="star-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="key-star-glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="faint-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#040812"/>

  <!-- Nebula glow layers -->
  <g id="nebula">
    <rect width="512" height="512" fill="url(#nebula-glow)"/>
    <rect width="512" height="512" fill="url(#nebula-glow2)"/>
    <!-- Subtle nebula wisps -->
    <ellipse cx="256" cy="210" rx="180" ry="150" fill="none" stroke="#3a1060" stroke-width="0.5" opacity="0.15"/>
    <ellipse cx="270" cy="220" rx="130" ry="110" fill="none" stroke="#4a1580" stroke-width="0.5" opacity="0.1"/>
  </g>

  <!-- Random background stars -->
  <g id="bg-stars">
    <circle cx="42" cy="28" r="1" fill="#e8f0ff" opacity="0.6"/>
    <circle cx="110" cy="55" r="1.5" fill="#b8d0ff" opacity="0.5"/>
    <circle cx="67" cy="112" r="0.8" fill="#e8f0ff" opacity="0.4"/>
    <circle cx="460" cy="35" r="1.2" fill="#e8f0ff" opacity="0.55"/>
    <circle cx="490" cy="88" r="0.7" fill="#b8d0ff" opacity="0.5"/>
    <circle cx="440" cy="140" r="1" fill="#e8f0ff" opacity="0.45"/>
    <circle cx="30" cy="200" r="1.3" fill="#b8d0ff" opacity="0.4"/>
    <circle cx="18" cy="310" r="0.8" fill="#e8f0ff" opacity="0.5"/>
    <circle cx="55" cy="400" r="1.1" fill="#e8f0ff" opacity="0.35"/>
    <circle cx="480" cy="270" r="1.4" fill="#b8d0ff" opacity="0.45"/>
    <circle cx="498" cy="350" r="0.7" fill="#e8f0ff" opacity="0.5"/>
    <circle cx="470" cy="440" r="1" fill="#e8f0ff" opacity="0.4"/>
    <circle cx="100" cy="475" r="1.2" fill="#b8d0ff" opacity="0.45"/>
    <circle cx="380" cy="490" r="0.9" fill="#e8f0ff" opacity="0.4"/>
    <circle cx="30" cy="480" r="1.5" fill="#e8f0ff" opacity="0.3"/>
    <circle cx="145" cy="22" r="0.8" fill="#b8d0ff" opacity="0.55"/>
    <circle cx="370" cy="18" r="1.1" fill="#e8f0ff" opacity="0.5"/>
    <circle cx="418" cy="490" r="1.3" fill="#b8d0ff" opacity="0.35"/>
    <circle cx="502" cy="180" r="0.9" fill="#e8f0ff" opacity="0.45"/>
    <circle cx="12" cy="155" r="1" fill="#b8d0ff" opacity="0.4"/>
  </g>

  <!--
    CONSTELLATION POINTS LAYOUT (female portrait, facing slightly 3/4):

    Hair top/crown:  196,72  218,58  240,52  262,50  284,54  306,64  324,80  336,100
    Hairline/forehead: 200,108  216,90  240,80  264,78  290,84  312,96
    Temple/sides: 192,130  196,155  198,180  310,118  318,140  316,165
    Eyes: L(222,148) L-outer(208,144) L-inner(236,146)  R(284,142) R-outer(298,140) R-inner(270,145)
    Nose bridge: 254,160  252,178  256,195
    Nose tip: 258,208
    Cheekbones: 206,175  204,195  306,170  308,192
    Ear L: 194,165  188,182  192,200
    Ear R: 316,158  322,175  318,195
    Upper lip: 238,228  256,224  274,228
    Lip center: 256,236
    Lower lip: 244,248  256,250  268,248
    Chin: 248,268  256,274  264,268
    Jaw L: 210,256  200,278  206,300
    Jaw R: 302,252  308,275  304,298
    Chin base: 232,304  256,312  280,306
    Neck: 240,328  256,338  272,330
    Shoulders L: 180,355  148,380  118,420  96,460
    Shoulders R: 332,352  362,378  394,418  420,460
    Collar: 218,360  256,368  294,362
    Hair flow L: 182,270  176,320  168,380  158,430
    Hair flow R: 330,260  336,310  342,375  348,430
  -->

