    <polygon points="200,160 256,162 222,202" fill="#a855f7" opacity="0.55"/>
    <polygon points="256,162 312,158 290,204" fill="#7c5cfc" opacity="0.62"/>
    <polygon points="312,158 368,150 338,200" fill="#c026d3" opacity="0.78"/>
  </g>

  <!-- Eyes / nose bridge -->
