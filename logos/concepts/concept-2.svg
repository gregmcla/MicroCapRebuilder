  <g id="neck-bust">
    <polygon points="214,404 256,408 236,444" fill="#5b8df5" opacity="0.60"/>
    <polygon points="256,408 298,404 276,444" fill="#7c5cfc" opacity="0.58"/>
    <polygon points="236,444 256,408 276,444" fill="#a855f7" opacity="0.45"/>
    <polygon points="170,420 214,404 190,460" fill="#4FD1C5" opacity="0.55"/>
    <polygon points="342,420 298,404 322,460" fill="#c026d3" opacity="0.52"/>
    <polygon points="190,460 236,444 210,490" fill="#7c5cfc" opacity="0.48"/>
