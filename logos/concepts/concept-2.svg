    <polygon points="170,352 214,346 192,390" fill="#c026d3" opacity="0.58"/>
    <polygon points="342,352 298,346 322,388" fill="#5b8df5" opacity="0.62"/>
    <polygon points="192,390 234,376 256,408" fill="#7c5cfc" opacity="0.55"/>
    <polygon points="278,376 322,388 256,408" fill="#a855f7" opacity="0.52"/>
    <polygon points="234,376 278,376 256,408" fill="#4FD1C5" opacity="0.48"/>
  </g>

