    <polygon points="236,316 276,316 256,352" fill="#a855f7" opacity="0.90"/>
    <polygon points="276,316 316,300 298,346" fill="#7c5cfc" opacity="0.78"/>
    <polygon points="214,346 256,352 234,376" fill="#5b8df5" opacity="0.60"/>
    <polygon points="256,352 298,346 278,376" fill="#4FD1C5" opacity="0.65"/>
