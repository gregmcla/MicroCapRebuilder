<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="55%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#4FD1C5" stop-opacity="0.18"/>
      <stop offset="35%" stop-color="#7c5cfc" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#a855f7" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#08080f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRing" cx="50%" cy="42%" r="48%" fx="50%" fy="42%">
      <stop offset="0%" stop-color="#c026d3" stop-opacity="0.0"/>
      <stop offset="55%" stop-color="#7c5cfc" stop-opacity="0.28"/>
      <stop offset="80%" stop-color="#5b8df5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#08080f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#08080f"/>

  <!-- Radial glow layers -->
  <g id="background-glow">
    <ellipse cx="256" cy="230" rx="230" ry="260" fill="url(#bgGlow)"/>
    <ellipse cx="256" cy="220" rx="200" ry="240" fill="url(#glowRing)"/>
  </g>

  <!-- Face facets — forehead / top of skull -->
  <g id="skull-top">
    <polygon points="190,72 256,58 230,120" fill="#7c5cfc" opacity="0.92"/>
    <polygon points="256,58 322,72 282,118" fill="#a855f7" opacity="0.85"/>
    <polygon points="230,120 256,58 282,118" fill="#5b8df5" opacity="0.78"/>
    <polygon points="155,110 190,72 230,120" fill="#c026d3" opacity="0.70"/>
    <polygon points="322,72 358,108 282,118" fill="#4FD1C5" opacity="0.72"/>
  </g>

  <!-- Forehead band -->
  <g id="forehead">
    <polygon points="155,110 230,120 200,160" fill="#a855f7" opacity="0.80"/>
    <polygon points="230,120 282,118 256,162" fill="#7c5cfc" opacity="0.88"/>
    <polygon points="282,118 358,108 312,158" fill="#5b8df5" opacity="0.75"/>
    <polygon points="200,160 230,120 256,162" fill="#4FD1C5" opacity="0.60"/>
    <polygon points="256,162 282,118 312,158" fill="#c026d3" opacity="0.65"/>
