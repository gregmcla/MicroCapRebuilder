    <polygon points="176,200 222,202 196,240" fill="#5b8df5" opacity="0.90"/>
    <polygon points="222,202 256,196 240,238" fill="#a855f7" opacity="0.45"/>
    <polygon points="256,196 290,204 272,238" fill="#4FD1C5" opacity="0.50"/>
    <polygon points="290,204 338,200 316,242" fill="#7c5cfc" opacity="0.88"/>
    <polygon points="196,240 222,202 240,238" fill="#c026d3" opacity="0.38"/>
