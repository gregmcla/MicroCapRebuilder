    <polygon points="406,180 426,158 418,198" fill="#c026d3" opacity="0.48"/>
    <polygon points="72,300 96,284 86,318" fill="#7c5cfc" opacity="0.42"/>
    <polygon points="418,310 440,294 432,328" fill="#5b8df5" opacity="0.40"/>
    <polygon points="120,430 140,414 128,448" fill="#a855f7" opacity="0.38"/>
    <polygon points="380,440 402,420 392,454" fill="#4FD1C5" opacity="0.35"/>
    <polygon points="100,82 120,66 108,98" fill="#c026d3" opacity="0.45"/>
    <polygon points="392,90 412,72 402,106" fill="#7c5cfc" opacity="0.42"/>
