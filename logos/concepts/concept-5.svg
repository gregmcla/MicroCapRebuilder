<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="248"/>
    </clipPath>
    <clipPath id="glitch-bar-1">
      <rect x="0" y="142" width="512" height="7"/>
    </clipPath>
    <clipPath id="glitch-bar-2">
      <rect x="0" y="198" width="512" height="4"/>
    </clipPath>
    <clipPath id="glitch-bar-3">
      <rect x="0" y="251" width="512" height="9"/>
    </clipPath>
    <clipPath id="glitch-bar-4">
      <rect x="0" y="299" width="512" height="5"/>
    </clipPath>
    <clipPath id="glitch-bar-5">
      <rect x="0" y="347" width="512" height="6"/>
    </clipPath>
    <clipPath id="glitch-bar-6">
      <rect x="0" y="388" width="512" height="4"/>
    </clipPath>
    <clipPath id="glitch-bar-7">
      <rect x="0" y="421" width="512" height="8"/>
    </clipPath>
    <clipPath id="glitch-bar-8">
      <rect x="0" y="172" width="512" height="3"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#050508"/>

  <!-- Outer circle frame -->
  <circle cx="256" cy="256" r="248" fill="#050508" stroke="#1a0a2e" stroke-width="2"/>

  <!-- Silhouette path definition: head oval, neck, shoulders, bust -->
  <!-- Shared silhouette shape: head center ~(256,190), shoulders ~y=380 -->

  <g clip-path="url(#circle-clip)">

    <!-- RED CHANNEL — shifted left -->
    <g style="mix-blend-mode: screen" opacity="0.85" transform="translate(-8, 0)">
      <!-- Head oval -->
      <ellipse cx="256" cy="188" rx="68" ry="80" fill="#ff2060"/>
      <!-- Hair top — fuller volume -->
      <ellipse cx="256" cy="142" rx="74" ry="42" fill="#ff2060"/>
      <!-- Hair left flow -->
      <ellipse cx="204" cy="178" rx="28" ry="52" fill="#ff2060"/>
      <!-- Hair right flow -->
      <ellipse cx="308" cy="178" rx="28" ry="52" fill="#ff2060"/>
      <!-- Neck -->
      <rect x="236" y="262" width="40" height="44" rx="8" fill="#ff2060"/>
      <!-- Left shoulder -->
      <ellipse cx="188" cy="338" rx="76" ry="32" fill="#ff2060"/>
      <!-- Right shoulder -->
      <ellipse cx="324" cy="338" rx="76" ry="32" fill="#ff2060"/>
      <!-- Upper chest / bust fill -->
      <rect x="148" y="320" width="216" height="100" rx="20" fill="#ff2060"/>
      <!-- Lower bust curve -->
      <ellipse cx="256" cy="400" rx="108" ry="48" fill="#ff2060"/>
      <!-- Collarbone area connecting neck to shoulders -->
      <ellipse cx="256" cy="298" rx="72" ry="24" fill="#ff2060"/>
    </g>

    <!-- GREEN/TEAL CHANNEL — centered -->
    <g style="mix-blend-mode: screen" opacity="0.85" transform="translate(0, 0)">
      <!-- Head oval -->
      <ellipse cx="256" cy="188" rx="68" ry="80" fill="#00ff99"/>
      <!-- Hair top -->
      <ellipse cx="256" cy="142" rx="74" ry="42" fill="#00ff99"/>
      <!-- Hair left flow -->
      <ellipse cx="204" cy="178" rx="28" ry="52" fill="#00ff99"/>
      <!-- Hair right flow -->
      <ellipse cx="308" cy="178" rx="28" ry="52" fill="#00ff99"/>
      <!-- Neck -->
      <rect x="236" y="262" width="40" height="44" rx="8" fill="#00ff99"/>
      <!-- Left shoulder -->
      <ellipse cx="188" cy="338" rx="76" ry="32" fill="#00ff99"/>
      <!-- Right shoulder -->
      <ellipse cx="324" cy="338" rx="76" ry="32" fill="#00ff99"/>
      <!-- Upper chest -->
      <rect x="148" y="320" width="216" height="100" rx="20" fill="#00ff99"/>
      <!-- Lower bust curve -->
      <ellipse cx="256" cy="400" rx="108" ry="48" fill="#00ff99"/>
      <!-- Collarbone area -->
      <ellipse cx="256" cy="298" rx="72" ry="24" fill="#00ff99"/>
    </g>

    <!-- BLUE CHANNEL — shifted right -->
    <g style="mix-blend-mode: screen" opacity="0.85" transform="translate(8, 0)">
      <!-- Head oval -->
      <ellipse cx="256" cy="188" rx="68" ry="80" fill="#4060ff"/>
      <!-- Hair top -->
      <ellipse cx="256" cy="142" rx="74" ry="42" fill="#4060ff"/>
      <!-- Hair left flow -->
      <ellipse cx="204" cy="178" rx="28" ry="52" fill="#4060ff"/>
      <!-- Hair right flow -->
      <ellipse cx="308" cy="178" rx="28" ry="52" fill="#4060ff"/>
      <!-- Neck -->
      <rect x="236" y="262" width="40" height="44" rx="8" fill="#4060ff"/>
      <!-- Left shoulder -->
      <ellipse cx="188" cy="338" rx="76" ry="32" fill="#4060ff"/>
      <!-- Right shoulder -->
      <ellipse cx="324" cy="338" rx="76" ry="32" fill="#4060ff"/>
      <!-- Upper chest -->
      <rect x="148" y="320" width="216" height="100" rx="20" fill="#4060ff"/>
      <!-- Lower bust curve -->
      <ellipse cx="256" cy="400" rx="108" ry="48" fill="#4060ff"/>
      <!-- Collarbone area -->
      <ellipse cx="256" cy="298" rx="72" ry="24" fill="#4060ff"/>
    </g>

    <!-- GLITCH BARS — horizontal scan corruption strips -->

    <!-- Bar 1 at y=142: red channel displaced right, teal color -->
    <g clip-path="url(#glitch-bar-1)">
      <g style="mix-blend-mode: screen" opacity="0.9">
        <!-- Displaced silhouette fragment — red shifted far right -->
        <g transform="translate(38, 0)" opacity="0.85">
          <ellipse cx="256" cy="188" rx="68" ry="80" fill="#ff2060"/>
          <ellipse cx="256" cy="142" rx="74" ry="42" fill="#ff2060"/>
          <ellipse cx="204" cy="178" rx="28" ry="52" fill="#ff2060"/>
          <ellipse cx="308" cy="178" rx="28" ry="52" fill="#ff2060"/>
        </g>
        <!-- Overlay glitch fill -->
        <rect x="60" y="142" width="180" height="7" fill="#00ffcc" opacity="0.6"/>
        <rect x="290" y="142" width="120" height="7" fill="#ff2060" opacity="0.4"/>
      </g>
    </g>

    <!-- Bar 2 at y=172 -->
    <g clip-path="url(#glitch-bar-8)">
      <g style="mix-blend-mode: screen" opacity="0.85">
        <rect x="80" y="172" width="240" height="3" fill="#4060ff" opacity="0.7"/>
        <rect x="0" y="172" width="90" height="3" fill="#00ff99" opacity="0.5"/>
      </g>
    </g>

    <!-- Bar 3 at y=198 -->
    <g clip-path="url(#glitch-bar-2)">
      <g style="mix-blend-mode: screen" opacity="0.9">
        <g transform="translate(-42, 0)" opacity="0.8">
          <ellipse cx="256" cy="188" rx="68" ry="80" fill="#4060ff"/>
          <ellipse cx="256" cy="142" rx="74" ry="42" fill="#4060ff"/>
        </g>
        <rect x="120" y="198" width="200" height="4" fill="#ff2060" opacity="0.5"/>
        <rect x="350" y="198" width="100" height="4" fill="#00ffcc" opacity="0.55"/>
      </g>
    </g>

    <!-- Bar 4 at y=251 -->
    <g clip-path="url(#glitch-bar-3)">
      <g style="mix-blend-mode: screen" opacity="0.9">
        <g transform="translate(52, 0)" opacity="0.75">
          <ellipse cx="256" cy="188" rx="68" ry="80" fill="#ff2060"/>
          <rect x="236" y="262" width="40" height="44" rx="8" fill="#ff2060"/>
        </g>
        <rect x="0" y="251" width="160" height="9" fill="#00ff99" opacity="0.45"/>
        <rect x="200" y="251" width="80" height="9" fill="#4060ff" opacity="0.6"/>
        <rect x="380" y="251" width="132" height="9" fill="#ff2060" opacity="0.4"/>
      </g>
    </g>

    <!-- Bar 5 at y=299 -->
    <g clip-path="url(#glitch-bar-4)">
      <g style="mix-blend-mode: screen" opacity="0.85">
        <g transform="translate(-28, 0)" opacity="0.8">
          <ellipse cx="256" cy="298" rx="72" ry="24" fill="#00ff99"/>
          <ellipse cx="188" cy="338" rx="76" ry="32" fill="#00ff99"/>
        </g>
        <rect x="50" y="299" width="300" height="5" fill="#ff2060" opacity="0.35"/>
        <rect x="400" y="299" width="112" height="5" fill="#00ffcc" opacity="0.5"/>
      </g>
    </g>

    <!-- Bar 6 at y=347 -->
    <g clip-path="url(#glitch-bar-5)">
      <g style="mix-blend-mode: screen" opacity="0.9">
        <g transform="translate(60, 0)" opacity="0.7">
          <ellipse cx="188" cy="338" rx="76" ry="32" fill="#4060ff"/>
          <ellipse cx="324" cy="338" rx="76" ry="32" fill="#4060ff"/>
        </g>
        <rect x="0" y="347" width="220" height="6" fill="#ff2060" opacity="0.5"/>
        <rect x="260" y="347" width="252" height="6" fill="#00ff99" opacity="0.4"/>
      </g>
    </g>

    <!-- Bar 7 at y=388 -->
    <g clip-path="url(#glitch-bar-6)">
      <g style="mix-blend-mode: screen" opacity="0.85">
        <g transform="translate(-50, 0)" opacity="0.75">
          <ellipse cx="256" cy="400" rx="108" ry="48" fill="#ff2060"/>
        </g>
        <rect x="100" y="388" width="180" height="4" fill="#4060ff" opacity="0.6"/>
        <rect x="320" y="388" width="192" height="4" fill="#00ffcc" opacity="0.45"/>
      </g>
    </g>

    <!-- Bar 8 at y=421 -->
    <g clip-path="url(#glitch-bar-7)">
      <g style="mix-blend-mode: screen" opacity="0.9">
        <g transform="translate(44, 0)" opacity="0.8">
          <ellipse cx="256" cy="400" rx="108" ry="48" fill="#00ff99"/>
          <rect x="148" y="320" width="216" height="100" rx="20" fill="#00ff99"/>
        </g>
        <rect x="0" y="421" width="140" height="8" fill="#ff2060" opacity="0.55"/>
        <rect x="180" y="421" width="200" height="8" fill="#4060ff" opacity="0.4"/>
        <rect x="420" y="421" width="92" height="8" fill="#00ffcc" opacity="0.5"/>
      </g>
    </g>

  </g>

  <!-- Outer ring accent -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="#2a0a3e" stroke-width="3"/>
  <!-- Inner subtle rim glow -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="#ff206018" stroke-width="6"/>
  <circle cx="256" cy="256" r="244" fill="none" stroke="#00ff9910" stroke-width="4"/>

</svg>
